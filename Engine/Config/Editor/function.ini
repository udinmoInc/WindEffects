# WindEffects editor function configuration
# Grid settings are hot-reloaded when this file changes.

[EditorGrid]
# Thickness (px)
EditorGrid.MinorThickness=1.0
EditorGrid.MajorThickness=1.1
EditorGrid.AxisThickness=1.1

# Colors (linear RGBA) — avoid pure white / bloom
EditorGrid.MinorGridColor=0.27,0.27,0.27,0.30
EditorGrid.MajorGridColor=0.37,0.37,0.37,0.45
EditorGrid.AxisXColor=0.57,0.29,0.29,0.55
EditorGrid.AxisZColor=0.29,0.57,0.29,0.55

# Disable any “glow” style controls (kept for config parity)
EditorGrid.AxisBloom=0
EditorGrid.AxisGlow=0.0
EditorGrid.AxisEmissive=0.0

# Keep legacy keys aligned (in case an older build reads them)
EditorGrid.LineThicknessMinor=1.0
EditorGrid.LineThicknessMajor=1.1
EditorGrid.MinorLineColor=0.27,0.27,0.27
EditorGrid.MinorLineOpacity=0.30
EditorGrid.MajorLineColor=0.37,0.37,0.37
EditorGrid.MajorLineOpacity=0.45

# Defaults / misc
EditorGrid.Enabled=1
EditorGrid.EnableAxisLines=1
EditorGrid.AntiAliasingEnabled=1
EditorGrid.AntiAliasScale=1.0
EditorGrid.BaseOpacity=1.0
EditorGrid.SnapOriginToCamera=1

[Editor.PlaceActors]
DefaultView=Grid
IconSize=56
CardSize=88
ShowDescriptions=true
EnableAnimations=true
RememberCategoryState=true
RememberSearchHistory=true
ShowRecent=true
ShowFavorites=true
GridColumns=3
ListRowHeight=44
CategoryHeaderHeight=30

[Editor.DefaultScene]
EnableDefaultScene=true
CreateDirectionalLight=true
CreateSkyLight=true
CreateSkyAtmosphere=true
CreateFog=true
CreateGroundPlane=false
SunIntensity=10.0
SunTemperature=6500
SunRotationPitch=-45
SunRotationYaw=35
SkyIntensity=1.0
SkyRealTimeCapture=true
FogDensity=0.01

[PipelineSkyIsolation]
# Enable pipeline stage isolation for sky rendering debug (Steps 0-7).
# Set SkyIsolationStep=0 for baseline (clear only), then increment one at a time.
# -1 uses individual Disable* flags below instead of cumulative steps.
Enabled=0
SkyIsolationStep=-1
DisableSky=0
DisableToneMapping=0
DisableAutoExposure=0
DisableFog=0
DisableClouds=0
DisableBloom=0
DisableSunDisk=0
DisableGrid=0
DisableGeometry=0
DisablePostProcessing=0
FixedExposureEV=0.0
FixedExposureMultiplier=1.0
BypassToneMapping=0
ForceExposureOne=0

[Editor.Environment]
AutoCreateOnNewLevel=true
CreateDirectionalLight=true
CreateSkyLight=true
CreateSkyAtmosphere=true
CreateHeightFog=true
CreateVolumetricClouds=true
EnableVolumetricFog=false
SunIntensity=10
SunTemperature=6500
SunRotationPitch=-45
SunRotationYaw=35
SkyLightIntensity=1
SkyLightRealTimeCapture=true
FogDensity=0.02
FogHeightFalloff=0.2
CloudCoverage=0.55
CloudAltitude=1250
