name: IgniteBT CI

# Engine push gate: IgniteBT unit tests + Editor Development builds + packaging.
on:
  push:
    paths:
      - 'Engine/**'
      - 'Assets/**'
      - 'IgniteBT.SDKs.json'
      - '.github/workflows/ignitebt-ci.yml'
      - '!Engine/**/*.md'
      - '!Engine/Docs/**'
      - '!Engine/Source/Programs/IgniteBT/Docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Engine/Source/Programs/IgniteBT/Source/IgniteBT.csproj

      - name: Build IgniteBT
        run: dotnet build Engine/Source/Programs/IgniteBT/Source/IgniteBT.csproj -c Development --no-restore

      - name: Run IgniteBT unit tests
        run: dotnet test Engine/Source/Programs/IgniteBT/Tests/IgniteBT.Tests.csproj -c Development --verbosity normal

      - name: Doctor
        run: dotnet run --project Engine/Source/Programs/IgniteBT/Source -- doctor

      - name: Build Editor Development (Unity OFF)
        run: ./we.ps1 build --target Editor --config Development --jobs 4

      - name: Incremental Editor Development (no-op / cache)
        run: ./we.ps1 build --target Editor --config Development --jobs 4

      - name: Build Editor Development (Unity ON)
        run: ./we.ps1 build --target Editor --config Development --jobs 4 --unity

      - name: Build Editor Debug
        run: ./we.ps1 build --target Editor --config Debug --jobs 4

      - name: Build Editor Shipping
        run: ./we.ps1 build --target Editor --config Shipping --jobs 4

      - name: Package Editor Shipping
        run: ./we.ps1 package --target Editor --config Shipping --skip-build --jobs 4
